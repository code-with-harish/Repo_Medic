name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check repomedic tests
      - name: Unit + e2e tests (local executor)
        run: python -m pytest tests -q -m "not docker"

  docker-executor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Docker-isolated execution tests
        run: python -m pytest tests -q -m docker

  demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e .  && python -m pip install pytest
      - name: End-to-end fixture investigation (cache-bug)
        run: repomedic investigate fixtures/cache-bug --executor local
      - name: End-to-end fixture investigation (schema-mismatch)
        run: repomedic investigate fixtures/schema-mismatch --executor local
